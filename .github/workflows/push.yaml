name: Push

on: [push, pull_request]

jobs:
  lint-ruff:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up ruff
        uses: astral-sh/ruff-action@v3
        with:
          version: latest
      
      - name: Lint with ruff
        run: ruff check
